name: Bug report
description: Report a reproducible Host Control defect without sharing private host data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste terminal output, credentials, public IPs, hostnames, private paths, or `data/` contents. Use synthetic replacements.
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA or release tag.
    validations:
      required: true
  - type: dropdown
    id: control-plane
    attributes:
      label: Control-plane mode
      options:
        - foreground
        - systemd-user
        - tmux-legacy
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Reproduction and observed behavior
      description: Use synthetic session names, paths, addresses, and terminal text.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, terminal output, IPs, hostnames, and private paths.
          required: true
