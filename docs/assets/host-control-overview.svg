<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Host Control interface overview</title>
  <desc id="description">A sanitized interface preview with synthetic agent sessions, floating terminals, and Project Desk context.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#edf3f9"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7f1ff"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#17243a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f2d3d" flood-opacity="0.16"/>
    </filter>
    <style>
      .ui { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #637188; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; }
      .body { fill: #344155; font-size: 14px; }
      .title { fill: #16202f; font-size: 20px; font-weight: 800; }
      .small { fill: #637188; font-size: 12px; }
      .terminalText { fill: #d9e5f4; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
      .terminalMuted { fill: #7890ad; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#page)"/>
  <g class="ui">
    <rect x="20" y="20" width="214" height="860" rx="18" fill="#ffffff" stroke="#d9e2ed" filter="url(#shadow)"/>
    <rect x="42" y="44" width="44" height="44" rx="11" fill="url(#brand)" stroke="#b9d0ee"/>
    <text x="64" y="72" text-anchor="middle" fill="#064f9f" font-size="12" font-weight="900">HC</text>
    <text x="100" y="62" class="title" font-size="17">Host Control</text>
    <text x="100" y="81" class="small">Terminal workspace</text>

    <rect x="36" y="116" width="182" height="42" rx="9" fill="#142033"/>
    <circle cx="55" cy="137" r="4" fill="#67d6a2"/>
    <text x="70" y="143" fill="#ffffff" font-size="13" font-weight="750">Terminals</text>
    <text x="50" y="190" class="body" font-weight="700">Queue</text>
    <rect x="102" y="175" width="22" height="20" rx="10" fill="#c83b32"/>
    <text x="113" y="190" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="800">2</text>
    <text x="50" y="232" class="body" font-weight="700">Tools</text>

    <text x="40" y="286" class="label">HOST SUMMARY</text>
    <rect x="36" y="302" width="84" height="72" rx="10" fill="#f7f9fc" stroke="#d9e2ed"/>
    <rect x="128" y="302" width="90" height="72" rx="10" fill="#f7f9fc" stroke="#d9e2ed"/>
    <text x="48" y="328" class="small">Agents</text><text x="48" y="358" class="title" font-size="24">4</text>
    <text x="140" y="328" class="small">Services</text><text x="140" y="358" class="title" font-size="24">3</text>
    <rect x="36" y="382" width="84" height="72" rx="10" fill="#f7f9fc" stroke="#d9e2ed"/>
    <rect x="128" y="382" width="90" height="72" rx="10" fill="#f7f9fc" stroke="#d9e2ed"/>
    <text x="48" y="408" class="small">Ports</text><text x="48" y="438" class="title" font-size="24">5</text>
    <text x="140" y="408" class="small">Live</text><text x="140" y="438" fill="#13884f" font-size="18" font-weight="800">ok</text>

    <rect x="254" y="20" width="1166" height="76" rx="16" fill="#ffffff" stroke="#d9e2ed" filter="url(#shadow)"/>
    <text x="280" y="46" class="label">TERMINAL-FIRST CONTROL</text>
    <text x="280" y="73" class="title">Agent workspace</text>
    <text x="446" y="72" class="small">4 sessions · 2 active · exact-pane monitoring</text>
    <rect x="1268" y="40" width="118" height="38" rx="9" fill="#0b63ce"/>
    <text x="1327" y="64" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="750">New Agent</text>

    <rect x="254" y="112" width="232" height="748" rx="15" fill="#ffffff" stroke="#d9e2ed"/>
    <text x="274" y="141" class="label">AGENTS</text>
    <text x="274" y="169" class="title" font-size="18">Sessions</text>
    <rect x="274" y="188" width="192" height="38" rx="9" fill="#f7f9fc" stroke="#d9e2ed"/>
    <text x="290" y="212" class="small">Find session or project</text>

    <rect x="268" y="242" width="204" height="78" rx="11" fill="#e8f1ff" stroke="#9fc5f4"/>
    <circle cx="286" cy="263" r="5" fill="#0b63ce"/>
    <text x="300" y="268" fill="#16202f" font-size="14" font-weight="800">agent-alpha</text>
    <text x="286" y="291" class="small">Example Tooling</text>
    <text x="286" y="309" fill="#0b63ce" font-size="11" font-weight="700">WORKING · JUST NOW</text>

    <rect x="268" y="330" width="204" height="78" rx="11" fill="#ffffff" stroke="#d9e2ed"/>
    <circle cx="286" cy="351" r="5" fill="#a96500"/>
    <text x="300" y="356" fill="#16202f" font-size="14" font-weight="800">agent-beta</text>
    <text x="286" y="379" class="small">Sample App</text>
    <text x="286" y="397" fill="#a96500" font-size="11" font-weight="700">NEEDS YOU · 3M</text>

    <rect x="268" y="418" width="204" height="78" rx="11" fill="#ffffff" stroke="#d9e2ed"/>
    <circle cx="286" cy="439" r="5" fill="#64748b"/>
    <text x="300" y="444" fill="#16202f" font-size="14" font-weight="800">agent-gamma</text>
    <text x="286" y="467" class="small">Documentation</text>
    <text x="286" y="485" fill="#64748b" font-size="11" font-weight="700">IDLE · 11M</text>

    <rect x="506" y="112" width="914" height="748" rx="15" fill="#f4f7fb" stroke="#d9e2ed"/>
    <text x="530" y="143" class="label">WORKSPACE</text>
    <text x="530" y="168" fill="#16202f" font-size="15" font-weight="800">2 terminals open</text>
    <rect x="1170" y="128" width="62" height="30" rx="7" fill="#142033"/><text x="1201" y="148" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Free</text>
    <rect x="1240" y="128" width="30" height="30" rx="7" fill="#ffffff" stroke="#d9e2ed"/><text x="1255" y="148" text-anchor="middle" class="small">1</text>
    <rect x="1278" y="128" width="30" height="30" rx="7" fill="#ffffff" stroke="#d9e2ed"/><text x="1293" y="148" text-anchor="middle" class="small">2</text>
    <rect x="1316" y="128" width="30" height="30" rx="7" fill="#ffffff" stroke="#d9e2ed"/><text x="1331" y="148" text-anchor="middle" class="small">4</text>
    <rect x="1354" y="128" width="48" height="30" rx="7" fill="#ffffff" stroke="#d9e2ed"/><text x="1378" y="148" text-anchor="middle" class="small">Full</text>

    <g filter="url(#shadow)">
      <rect x="530" y="190" width="520" height="304" rx="13" fill="url(#terminal)"/>
      <rect x="530" y="190" width="520" height="42" rx="13" fill="#1d2b42"/>
      <rect x="530" y="220" width="520" height="12" fill="#1d2b42"/>
      <circle cx="552" cy="211" r="5" fill="#67d6a2"/>
      <text x="566" y="216" fill="#ffffff" font-size="13" font-weight="750">agent-alpha</text>
      <text x="1020" y="216" text-anchor="end" fill="#9fb0c5" font-size="12">−  □  ×</text>
      <text x="552" y="260" class="terminalMuted">STATUS</text>
      <text x="552" y="284" class="terminalText">Implementing the exact-pane safety test.</text>
      <text x="552" y="318" class="terminalMuted">RESULT</text>
      <text x="552" y="342" class="terminalText">Auth boundary and fixtures updated.</text>
      <text x="552" y="376" class="terminalMuted">EVIDENCE</text>
      <text x="552" y="400" class="terminalText">Focused checks: 12 passed.</text>
      <text x="552" y="444" fill="#67d6a2" font-family="ui-monospace, monospace" font-size="13">› Working</text>
      <rect x="552" y="463" width="474" height="1" fill="#31445f"/>
    </g>

    <g filter="url(#shadow)">
      <rect x="842" y="390" width="550" height="272" rx="13" fill="url(#terminal)"/>
      <rect x="842" y="390" width="550" height="42" rx="13" fill="#1d2b42"/>
      <rect x="842" y="420" width="550" height="12" fill="#1d2b42"/>
      <circle cx="864" cy="411" r="5" fill="#f5ba59"/>
      <text x="878" y="416" fill="#ffffff" font-size="13" font-weight="750">agent-beta</text>
      <text x="1362" y="416" text-anchor="end" fill="#9fb0c5" font-size="12">−  □  ×</text>
      <text x="864" y="466" class="terminalText">Need a decision on the verification scope.</text>
      <text x="864" y="502" class="terminalMuted">1. Focused integration checks</text>
      <text x="864" y="528" class="terminalMuted">2. Full repository validation</text>
      <rect x="864" y="558" width="504" height="58" rx="8" fill="#111b2b" stroke="#31445f"/>
      <text x="882" y="592" fill="#d9e5f4" font-family="ui-monospace, monospace" font-size="13">Type a response…</text>
    </g>

    <rect x="530" y="684" width="862" height="152" rx="12" fill="#ffffff" stroke="#d9e2ed"/>
    <text x="550" y="712" class="label">FOCUSED TERMINAL</text>
    <text x="550" y="739" class="title" font-size="18">Project Desk</text>
    <text x="550" y="764" class="small">Example Tooling · feature/terminal-layout · 4 changed files</text>
    <rect x="550" y="784" width="174" height="34" rx="8" fill="#f7f9fc" stroke="#d9e2ed"/>
    <text x="566" y="806" class="body" font-weight="700">Checks available: 3</text>
    <rect x="736" y="784" width="174" height="34" rx="8" fill="#e7f7ee" stroke="#a7dfbf"/>
    <text x="752" y="806" fill="#13884f" font-size="13" font-weight="750">Mission: Running</text>
    <rect x="922" y="784" width="198" height="34" rx="8" fill="#f7f9fc" stroke="#d9e2ed"/>
    <text x="938" y="806" class="body" font-weight="700">Files: 2 deliverables</text>
    <rect x="1132" y="784" width="238" height="34" rx="8" fill="#e8f1ff" stroke="#9fc5f4"/>
    <text x="1251" y="806" text-anchor="middle" fill="#0b63ce" font-size="13" font-weight="750">Review prompt for exact target</text>
  </g>
</svg>
